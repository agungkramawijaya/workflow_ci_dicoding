name: MLflow Production CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  retrain-model:
    name: Automated Model Retraining
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Provision Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"
          cache: "pip"

      - name: Install Dependencies
        # Menginstall library yang ada di conda.yaml agar environment runner siap
        run: |
          python -m pip install --upgrade pip
          pip install -r MLProject/requirements.txt

      - name: Execute MLflow Pipeline
        env:
          # Menggunakan SQLite agar database tracking konsisten di lingkungan CI
          MLFLOW_TRACKING_URI: sqlite:///${{ github.workspace }}/mlruns.db
        run: |
          # Pindah ke folder tempat file MLProject berada
          cd MLProject
          mlflow run . \
            # Jalankan Baseline Terlebih Dahulu
            mlflow run . --entry-point baseline --experiment-name "Sentiment_Analysis_Baseline" --env-manager=local -P data_dir=indonesian-financial-phrasebank_preprocessing
            # Kemudian Jalankan Tuning
            mlflow run . --entry-point tuning --experiment-name "Sentiment_Analysis_RF" --env-manager=local -P data_dir=indonesian-financial-phrasebank_preprocessing

      - name: Persist Tracking Database & Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-model-artifacts
          path: |
            ${{ github.workspace }}/mlruns.db
            MLProject/mlruns/
          retention-days: 14